name: Bruin Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bruin CLI
        run: curl -LsSf https://getbruin.com/install/cli | sh

      - name: Add Bruin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Validate pipeline
        run: bruin validate .
        working-directory: .
